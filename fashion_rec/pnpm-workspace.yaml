packages:
  - 'frontend'
  - 'uniapp-v2'
  - 'shared'

# exFAT 不支持 symlink，使用 hoisted + 复制 workspace 包
nodeLinker: hoisted
symlinkWorkspacePackages: false
injectWorkspacePackages: true
linkWorkspacePackages: false
autoInstallPeers: true
strictPeerDependencies: false
shamefullyHoist: true
# exFAT 上 install 可能在 workspace 链接阶段失败；禁止 dev 前自动 install
verifyDepsBeforeRun: false

overrides:
  '@dcloudio/uni-app': 3.0.0-4080720251210001
  '@dcloudio/uni-app-harmony': 3.0.0-4080720251210001
  '@dcloudio/uni-app-plus': 3.0.0-4080720251210001
  '@dcloudio/uni-components': 3.0.0-4080720251210001
  '@dcloudio/uni-h5': 3.0.0-4080720251210001
  '@dcloudio/uni-cli-shared': 3.0.0-4080720251210001
  '@dcloudio/vite-plugin-uni': 3.0.0-4080720251210001
  fashion-rec-uniapp-v2>vite: 5.2.8
  fashion-rec-uniapp-v2>typescript: 5.8.3
  unconfig: 7.3.2
  bin-wrapper: npm:bin-wrapper-china
  mime: 3.0.0

peerDependencyRules:
  ignoreMissing: []
  allowedVersions:
    vue: '3.5'

allowBuilds:
  '@parcel/watcher': true
  '@uni-helper/unocss-preset-uni': true
  core-js: true
  es5-ext: true
  esbuild: true
  sharp: true
  vue-demi: true
  workerd: true
