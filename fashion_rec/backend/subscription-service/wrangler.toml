name = "fashion-rec-subscription-service"
main = "src/index.ts"
compatibility_date = "2025-11-17"
compatibility_flags = ["nodejs_compat"]

# Account ID configuration
# Wrangler automatically reads CLOUDFLARE_ACCOUNT_ID from environment variables
# For local development, you can uncomment and set the account_id below:
# account_id = "your-account-id-here"

# 路由配置 - 可以根据实际需要配置自定义域名路由
# routes = [
#   { pattern = "api.subscription.example.com/*", zone_name = "example.com" }
# ]

# 环境变量 - 非敏感信息可以通过 vars 配置
# 敏感信息（API keys, secrets）需要通过 wrangler secret put 或 Cloudflare Dashboard 设置
# 注意：本地开发时，.dev.vars 文件中的值会覆盖这里的设置
# 如果要修改测试模式，请编辑 .dev.vars 文件中的 CREEM_TEST_MODE
# [vars]
# CREEM_TEST_MODE = "true"  # 已注释，使用 .dev.vars 中的配置

# 构建配置
# Wrangler 会自动处理 TypeScript 编译，无需手动构建命令

# 开发服务器配置
[dev]
port = 3001  # 与前端默认端口保持一致（前端使用 localhost:3001）
local_protocol = "http"

# Observability configuration
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

