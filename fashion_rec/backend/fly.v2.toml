# fly.toml app configuration file for V2 backend (dormant template)
#
# The Fly app fashion-rec-backend-v2 is not deployed in production; all API traffic
# uses fashion-rec-backend. Re-enable steps: see DEPLOYMENT.md §「重新启用 V2 Fly 测试」.
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fashion-rec-backend-v2'
primary_region = 'sin'

[build]

[env]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    timeout = "15s"
    tls_skip_verify = false
    path = "/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

