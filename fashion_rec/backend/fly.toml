# fly.toml app configuration file generated for fashion-rec-backend on 2025-11-24T00:26:46+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fashion-rec-backend'
primary_region = 'sin'

[build]

[env]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    tls_skip_verify = false
    path = "/health"

# Wormhole iroh relay (same Machine as FastAPI). Clients: https://fashion-rec-backend.fly.dev:3340/
[[services]]
  protocol = "tcp"
  internal_port = 3340
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[services.ports]]
    port = 3340
    handlers = ["tls", "http"]

[[vm]]
  memory = '1536mb'
  cpu_kind = 'shared'
  cpus = 1
