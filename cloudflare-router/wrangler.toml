name = "fashion-rec-router"
main = "src/index.ts"
compatibility_date = "2025-11-17"
compatibility_flags = ["nodejs_compat"]

# Environment variables (set via wrangler secret put or Cloudflare Dashboard)
# These should be set as secrets, not in this file
# 
# Required secrets:
# - SUPABASE_URL: Your Supabase project URL
# - SUPABASE_SERVICE_ROLE_KEY: Supabase Service Role Key (for bypassing RLS)
# - STABLE_FRONTEND_HOST: Stable version frontend hostname (e.g., fashion-rec-frontend.pages.dev)
# - V2_FRONTEND_HOST: V2 version frontend hostname (e.g., v2.fashion-rec-frontend.pages.dev)
# - STABLE_BACKEND_URL: Stable version backend URL (e.g., https://fashion-rec-backend.fly.dev)
# - V2_BACKEND_URL: V2 backend URL (aliases STABLE_BACKEND_URL while v2 Fly app is dormant)
# - STABLE_SUBSCRIPTION_SERVICE_URL: Stable version subscription service URL (e.g., https://subscription.hdz73.com)
# - V2_SUBSCRIPTION_SERVICE_URL: V2 version subscription service URL (e.g., https://fashion-rec-subscription-service-v2.workers.dev)
# - BLOG_SERVICE_URL: Blog service URL (e.g., https://fashion-rec-blog.954504788.workers.dev)
#
# KV Namespace for caching user versions
# Create with: wrangler kv namespace create USER_VERSIONS
# Then add the namespace ID below
[[kv_namespaces]]
binding = "USER_VERSIONS"
id = "e335d5ff4f4948718434187ca14f94b7"

# Service Binding: 内部调用 Blog Worker，绕过 Cloudflare Access
[[services]]
binding = "BLOG_SERVICE"
service = "fashion-rec-blog"

# Service Binding: 内部调用 Subscription Worker，跳过公网 HTTP 栈
[[services]]
binding = "SUBSCRIPTION_SERVICE"
service = "fashion-rec-subscription-service"

# Routes configuration
# Configure routes in Cloudflare Dashboard:
# Workers & Pages → fashion-rec-router → Settings → Triggers → Routes
# 
# IMPORTANT: Route format must include wildcard /* at the end
# Correct format: fashion-rec.com/*
# Wrong format: fashion-rec.com (will cause ERR_CONNECTION_CLOSED)
#
# To configure via Dashboard:
# 1. Go to Workers & Pages → fashion-rec-router → Settings → Triggers → Routes
# 2. Add route: fashion-rec.com/* (new domain)
# 3. Keep route: fashion.hdz73.com/* (old domain, for 301 redirect)
# 4. Ensure DNS records exist with proxy enabled (orange cloud)
#
# Note: The worker will automatically redirect fashion.hdz73.com to fashion-rec.com with 301.
# Routes can also be configured in this file using routes array,
# but Dashboard configuration is recommended for custom domains.

[env.production]
# Production environment configuration
# Routes should be configured in Cloudflare Dashboard

[env.staging]
# Staging environment configuration (optional)

# Development server configuration
[dev]
port = 8787
local_protocol = "http"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
