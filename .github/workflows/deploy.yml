name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: ./fashion_rec/backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm ci
        working-directory: ./fashion_rec/frontend
      - name: Build
        run: npm run build
        working-directory: ./fashion_rec/frontend
        env:
          # Set these in GitHub Repository Settings -> Secrets and Variables -> Variables
          VITE_API_URL: ${{ vars.VITE_API_URL }} 
          VITE_AUTH_URL: ${{ vars.VITE_AUTH_URL }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fashion-rec-frontend
          directory: ./fashion_rec/frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
