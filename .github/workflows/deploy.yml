name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      subscription-service: ${{ steps.filter.outputs.subscription-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            frontend:
              - 'fashion_rec/frontend/**'
            backend:
              - 'fashion_rec/backend/**'
              - '!fashion_rec/backend/subscription-service/**'
            subscription-service:
              - 'fashion_rec/backend/subscription-service/**'

  deploy-backend:
    name: Deploy Backend
    needs: changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: ./fashion_rec/backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-subscription-service:
    name: Deploy Subscription Service
    needs: changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      needs.changes.outputs.subscription-service == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: fashion_rec/backend/subscription-service/pnpm-lock.yaml
      - name: Install Dependencies
        run: |
          # Clear any proxy settings that might interfere
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy ALL_PROXY all_proxy || true
          pnpm install --frozen-lockfile
        working-directory: ./fashion_rec/backend/subscription-service
      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --account-id ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: ./fashion_rec/backend/subscription-service
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Frontend
    needs: changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: fashion_rec/frontend/pnpm-lock.yaml
      - name: Install Dependencies
        run: |
          # Clear any proxy settings that might interfere
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy ALL_PROXY all_proxy || true
          # Temporarily remove proxy settings from .npmrc if they exist
          if [ -f .npmrc ]; then
            sed -i.bak '/^proxy=/d; /^https-proxy=/d' .npmrc || true
          fi
          pnpm install --frozen-lockfile
        working-directory: ./fashion_rec/frontend
      - name: Build
        run: pnpm build
        working-directory: ./fashion_rec/frontend
        env:
          # Set these in GitHub Repository Settings -> Secrets and Variables -> Variables
          VITE_API_URL: ${{ vars.VITE_API_URL }} 
          VITE_SUBSCRIPTION_API_URL: ${{ vars.VITE_SUBSCRIPTION_API_URL }}
          VITE_CREEM_PRODUCT_ID: ${{ vars.VITE_CREEM_PRODUCT_ID }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ vars.VITE_SUPABASE_KEY }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fashion-rec-frontend
          directory: ./fashion_rec/frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
